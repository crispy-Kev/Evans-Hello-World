<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Webpage with Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f7f7f7;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input,
    textarea,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Contact Us</h1>
    <h2>This is a test, Lets see if it auto uploads on the git pages, here we go</h2>
    <h3>  Yeah so I'm adding another header to this form... How do I get data dynamically stored in this form??</h3>
    <form>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>

      <label for="age">Age</label>
      <input type="number" id="age" name="age" placeholder="Your age" required>

      <label for="occupation">occupation</label>
      <input type="text" id="occupation" name="occupation" placeholder="Your occupation">

      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
