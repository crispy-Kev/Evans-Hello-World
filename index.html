<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evan's Hello World</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #ff8709;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      background: #a2d0cf;
      border: 1px solid #7896c3;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
      text-align: center;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input,
    textarea,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #1e3579;
      color: #ec9d37;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background-color: #223156;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>A website test for Vercel</h1>
    <h2>Input your information, please</h2>
    <form id="form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>

      <label for="age">Age</label>
      <input type="number" id="age" name="age" placeholder="Your age" required>

      <label for="occupation">occupation</label>
      <input type="text" id="occupation" name="occupation" placeholder="Your occupation" required>

      <label for="ssn">Social Security Number</label>
      <input type="text" id="ssn" name="ssn" placeholder="Your ssn">

      <button type="submit">Submit!</button>
    </form>
  </div>
</body>
</html>
